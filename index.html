<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Imed Study - Dental Terms</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F2F2F7; color: #1C1C1E; overflow: hidden; }
        .apple-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: rgba(255, 255, 255, 0.85); }
        .card-container { perspective: 1000px; height: 45vh; max-height: 380px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .card-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 30px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 25px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1); }
        .card-back { transform: rotateY(180deg); background: #F9F9FB; border: 1px solid #E5E5EA; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .animate-shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }
        .tab-bar { padding-bottom: env(safe-area-inset-bottom); height: calc(70px + env(safe-area-inset-bottom)); }
        .content-area { height: calc(100vh - 190px - env(safe-area-inset-bottom)); overflow-y: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const RAW_DATA = [
            {e:"A sharp edge",r:"Острый край"},{e:"Adult",r:"Взрослый"},{e:"Bicuspid",r:"Премоляр"},{e:"Bony substance",r:"Костное вещество"},{e:"Bulk",r:"Основная масса"},{e:"Canine",r:"Клык"},{e:"Chamber",r:"Камера"},{e:"Crown",r:"Коронка"},{e:"Cement",r:"Цемент"},{e:"Chisel-shaped",r:"Долотообразный"},{e:"Cusp",r:"Острый кончик зуба"},{e:"Cuspid",r:"Клык (Cuspid)"},{e:"Dental tissues",r:"Зубная ткань"},{e:"Dentine",r:"Дентин"},{e:"Enamel",r:"Эмаль"},{e:"Eye-tooth",r:"Верхний клык"},{e:"Foramen",r:"Отверстие"},{e:"Gum",r:"Десна"},{e:"Identical",r:"Идентичный"},{e:"Incisor",r:"Резец"},{e:"Lower jaw",r:"Нижняя челюсть"},{e:"Molar",r:"Моляр"},{e:"Neck",r:"Шейка"},{e:"Peg-shaped",r:"Клиновидный"},{e:"Periodontal membrane",r:"Периодонт"},{e:"Premolar",r:"Премоляр"},{e:"Pulp",r:"Пульпа"},{e:"Root",r:"Корень"},{e:"Root canal",r:"Корневой канал"},{e:"Saliva",r:"Слюна"},{e:"Shape",r:"Форма"},{e:"Socket",r:"Ячейка"},{e:"Tip",r:"Кончик"},{e:"To chew",r:"Жевать"},{e:"To cut",r:"Разрезать"},{e:"To grind",r:"Молоть/Размалывать"},{e:"To maintain",r:"Поддерживать"},{e:"To mash",r:"Дробить"},{e:"To occur",r:"Случаться"},{e:"To refer to",r:"Сослаться"},{e:"To shred",r:"Крошить"},{e:"To tear",r:"Разрывать (Гл.)"},{e:"Tooth",r:"Зуб"},{e:"Tubercule",r:"Бугорок"},{e:"Upper jaw",r:"Верхняя челюсть"},{e:"Wisdom tooth",r:"Зуб мудрости"},{e:"Amount",r:"Количество"},{e:"Attachment",r:"Прикрепление"},{e:"Beyond the border",r:"Ниже/выше границы"},{e:"Supporting tissues",r:"Поддерживающие ткани"},{e:"Suspensory mechanism",r:"Поддерживающий механизм"},{e:"Exposed tissues",r:"Незащищенные ткани"},{e:"Fibrous tissues",r:"Волокнистые ткани"},{e:"Friction",r:"Трение"},{e:"To fasten",r:"Прикреплять"},{e:"To increase",r:"Увеличивать"},{e:"To overlap",r:"Перекрывать"},{e:"To resemble",r:"Напоминать"},{e:"To surround",r:"Окружать"},{e:"To swallow",r:"Глотать"},{e:"To wear",r:"Изнашивать"},{e:"Masticatory",r:"Жевательный"},{e:"Palatal",r:"Небный"},{e:"Pharynx",r:"Глотка"},{e:"To be located",r:"Быть расположенным"},{e:"To comprise",r:"Включать"},{e:"To develop",r:"Развиваться"},{e:"To grow",r:"Расти"},{e:"To include",r:"Включать (include)"},{e:"To line",r:"Выстилать"},{e:"To observe",r:"Наблюдать"},{e:"To separate",r:"Разделять"},{e:"To support",r:"Поддерживать (support)"},{e:"Undergo",r:"Подвергаться"},{e:"Chewing",r:"Жевание"},{e:"Deglutition",r:"Глотание"},{e:"Dentition",r:"Зубной ряд"},{e:"Edge",r:"Край"},{e:"Insalivation",r:"Смачивание слюной"},{e:"Oropharynx",r:"Ротоглотка"},{e:"Pharyngeal cavity",r:"Гортанно-глоточная полость"},{e:"Respiration",r:"Дыхание"},{e:"Space",r:"Пространство"},{e:"Tear (noun)",r:"Разрыв (сущ.)"},{e:"To be subjected to",r:"Подвергаться (subject)"},{e:"To extend",r:"Простираться"},{e:"A bite (occlusion)",r:"Прикус"},{e:"A set",r:"Ряд, комплект"},{e:"Crooked",r:"Изогнутый"},{e:"Crowded",r:"Скученный"},{e:"Deciduous teeth",r:"Молочные зубы"},{e:"Dental arch",r:"Зубная дуга"},{e:"Eruption",r:"Прорезывание"},{e:"Impacted",r:"Ретинированный"},{e:"Keystone",r:"Краеугольный камень"},{e:"Permanent teeth",r:"Постоянные зубы"},{e:"Rate",r:"Скорость"},{e:"Replace",r:"Замещать"},{e:"To come in",r:"Прорезываться (in)"},{e:"To come through",r:"Прорезываться (through)"},{e:"To delay",r:"Задерживать"},{e:"To dissolve",r:"Рассасываться"},{e:"To erupt",r:"Прорезываться (erupt)"},{e:"To extract",r:"Удалять (зуб)"},{e:"To fall out",r:"Выпадать"},{e:"To loosen",r:"Расшатываться"},{e:"Tooth bud",r:"Зубной зачаток"},{e:"Boundary",r:"Граница"},{e:"Fissure",r:"Фиссура"},{e:"Something like",r:"Что-то вроде"},{e:"The floor of the orbita",r:"Основание глазницы"},{e:"The nares",r:"Носовая полость"},{e:"To bound",r:"Ограничивать"},{e:"To enter into formatting",r:"Принимать участие в формировании"},{e:"To protrude",r:"Выступать"},{e:"Draw a tooth",r:"Вырвать зуб"},{e:"Barber",r:"Парикмахер"},{e:"Condyloid process",r:"Мыщелковый отросток"},{e:"Mandibular notch",r:"Нижнечелюстная вырезка"},{e:"Coronoid process",r:"Венечный отросток"},{e:"Mental foramen",r:"Подбородочное отверстие"},{e:"Outer surface",r:"Наружная поверхность"},{e:"Inner surface",r:"Внутренняя поверхность"},{e:"Periodontal ligament",r:"Периодонтальная связка"},{e:"Oral mucosa",r:"Слизистая рта"},{e:"Dentistry",r:"Стоматология"},{e:"Tooth decay",r:"Кариес"},{e:"To diagnose",r:"Диагностировать"},{e:"To prevent",r:"Предотвращать"},{e:"To estimate",r:"Оценивать"},{e:"Dentures",r:"Протезы"},{e:"To perform",r:"Выполнять"},{e:"Prosthodontics",r:"Ортопедическая стоматология"},{e:"Orthodontics",r:"Ортодонтия"},{e:"Conservation",r:"Консервативное лечение"},{e:"Oral surgery",r:"Хирургическая стоматология"},{e:"To provide",r:"Предоставлять"},{e:"To involve",r:"Вовлекать"},{e:"To carry out",r:"Осуществлять"},{e:"Molar (v2)",r:"Моляр (тип 2)"},{e:"Pulp (v2)",r:"Пульпа (тип 2)"},{e:"Socket (v2)",r:"Ячейка (тип 2)"},{e:"To maintain (v2)",r:"Поддерживать (тип 2)"},{e:"To tear (v2)",r:"Разрывать (тип 2)"},{e:"Amount (v2)",r:"Количество (тип 2)"},{e:"Dental tissues (v2)",r:"Зубные ткани (тип 2)"},{e:"To increase (v2)",r:"Увеличивать (тип 2)"},{e:"To wear (v2)",r:"Изнашивать (тип 2)"}
        ]; // Ровно 144 слова

        const App = () => {
            const [activeTab, setActiveTab] = useState('cards');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [isEngToRus, setIsEngToRus] = useState(true);
            const [learned, setLearned] = useState(new Set());
            const [search, setSearch] = useState('');
            
            // Quiz State
            const [quizHistory, setQuizHistory] = useState([]); // [{correct, options, selected, shaken}]
            const [quizIndex, setQuizIndex] = useState(-1);

            const words = useMemo(() => RAW_DATA.map((w, i) => ({ ...w, id: i })), []);

            useEffect(() => { lucide.createIcons(); }, [activeTab, currentIndex, quizIndex, isFlipped]);

            // Исправленная смена карточки без "мелькания"
            const changeCard = (nextIndex) => {
                setIsFlipped(false);
                setTimeout(() => {
                    setCurrentIndex(nextIndex);
                }, 150); // Ждем пока карточка начнет "сворачиваться"
            };

            const handleKnown = () => {
                const nextLearned = new Set(learned);
                nextLearned.add(words[currentIndex].id);
                setLearned(nextLearned);
                changeCard((currentIndex + 1) % words.length);
            };

            const generateNewQuiz = useCallback(() => {
                const correct = words[Math.floor(Math.random() * words.length)];
                let options = [correct];
                while(options.length < 4) {
                    const r = words[Math.floor(Math.random() * words.length)];
                    if(!options.find(o => o.id === r.id)) options.push(r);
                }
                const newQuiz = { 
                    correct, 
                    options: options.sort(() => Math.random() - 0.5), 
                    selected: null, 
                    shaken: false 
                };
                setQuizHistory(prev => [...prev, newQuiz]);
                setQuizIndex(prev => prev + 1);
            }, [words]);

            useEffect(() => {
                if(activeTab === 'quiz' && quizHistory.length === 0) generateNewQuiz();
            }, [activeTab, generateNewQuiz, quizHistory.length]);

            const handleQuizAnswer = (optId) => {
                if(quizHistory[quizIndex].selected) return;
                
                const current = quizHistory[quizIndex];
                const isCorrect = optId === current.correct.id;
                
                const newHistory = [...quizHistory];
                newHistory[quizIndex] = { ...current, selected: optId, shaken: !isCorrect };
                setQuizHistory(newHistory);

                if(isCorrect) {
                    setLearned(prev => new Set(prev).add(optId));
                    setTimeout(() => {
                        if (quizIndex === quizHistory.length - 1) generateNewQuiz();
                        else setQuizIndex(quizIndex + 1);
                    }, 1200);
                }
            };

            return (
                <div className="h-screen flex flex-col">
                    {/* Header */}
                    <header className="px-6 pt-12 pb-4 apple-blur flex-none z-10">
                        <div className="flex justify-between items-baseline mb-2">
                            <h1 className="text-2xl font-bold tracking-tight text-gray-900">Imed Study</h1>
                            <span className="text-sm font-bold text-blue-500">{learned.size}/144</span>
                        </div>
                        <div className="h-2 w-full bg-gray-200 rounded-full overflow-hidden">
                            <div className="h-full bg-blue-500 transition-all duration-700 ease-out" style={{width: `${(learned.size/144)*100}%`}}></div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 px-6 pt-4 content-area">
                        {activeTab === 'cards' && (
                            <div className="flex flex-col h-full justify-between pb-6">
                                <div className="flex justify-center">
                                    <button onClick={() => setIsEngToRus(!isEngToRus)} className="text-[10px] font-black px-4 py-1.5 bg-white rounded-full shadow-sm text-blue-600 border border-blue-50 tracking-widest uppercase">
                                        {isEngToRus ? 'ENG ➔ RUS' : 'RUS ➔ ENG'}
                                    </button>
                                </div>

                                <div className="card-container" onClick={() => setIsFlipped(!isFlipped)}>
                                    <div className={`card-inner ${isFlipped ? 'card-flipped' : ''}`}>
                                        <div className="card-face bg-white">
                                            <p className="text-3xl font-bold px-4">{isEngToRus ? words[currentIndex].e : words[currentIndex].r}</p>
                                        </div>
                                        <div className="card-face card-back">
                                            <p className="text-3xl font-bold text-blue-600 px-4">{isEngToRus ? words[currentIndex].r : words[currentIndex].e}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex justify-between items-center space-x-4">
                                    <button onClick={() => changeCard((currentIndex - 1 + words.length) % words.length)} className="w-14 h-14 flex items-center justify-center bg-white rounded-full shadow-sm active:bg-gray-50"><i data-lucide="arrow-left" className="w-6 h-6"></i></button>
                                    <button onClick={handleKnown} className="flex-1 h-14 bg-blue-500 text-white rounded-2xl font-bold shadow-lg shadow-blue-200 active:scale-[0.98] transition-transform">ЗНАЮ</button>
                                    <button onClick={() => changeCard((currentIndex + 1) % words.length)} className="w-14 h-14 flex items-center justify-center bg-white rounded-full shadow-sm active:bg-gray-50"><i data-lucide="arrow-right" className="w-6 h-6"></i></button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'quiz' && quizIndex >= 0 && (
                            <div className="flex flex-col h-full">
                                <div className="bg-white p-8 rounded-[32px] shadow-sm text-center mb-6 relative">
                                    <p className="text-xs font-bold text-blue-400 uppercase mb-2 tracking-widest">Вопрос {quizIndex + 1}</p>
                                    <p className="text-2xl font-bold">{quizHistory[quizIndex].correct.e}</p>
                                </div>
                                <div className="space-y-3 flex-1">
                                    {quizHistory[quizIndex].options.map((opt) => {
                                        const isCorrect = opt.id === quizHistory[quizIndex].correct.id;
                                        const isSelected = quizHistory[quizIndex].selected === opt.id;
                                        let style = "bg-white text-gray-800";
                                        if(quizHistory[quizIndex].selected) {
                                            if(isCorrect) style = "bg-green-500 text-white border-green-500";
                                            else if(isSelected) style = "bg-red-500 text-white border-red-500 animate-shake";
                                        }
                                        return (
                                            <button key={opt.id} onClick={() => handleQuizAnswer(opt.id)} className={`w-full p-5 rounded-2xl font-semibold text-left transition-all duration-200 border-2 border-transparent shadow-sm ${style}`}>
                                                {opt.r}
                                            </button>
                                        );
                                    })}
                                </div>
                                <div className="flex justify-between items-center py-4">
                                    <button 
                                        disabled={quizIndex === 0}
                                        onClick={() => setQuizIndex(quizIndex - 1)}
                                        className={`px-6 py-3 rounded-xl font-bold flex items-center space-x-2 ${quizIndex === 0 ? 'text-gray-300' : 'text-blue-500 bg-blue-50'}`}
                                    >
                                        <i data-lucide="chevron-left" className="w-5 h-5"></i><span>Назад</span>
                                    </button>
                                    <button 
                                        onClick={() => {
                                            if (quizIndex === quizHistory.length - 1) generateNewQuiz();
                                            else setQuizIndex(quizIndex + 1);
                                        }}
                                        className="px-6 py-3 bg-blue-50 rounded-xl text-blue-500 font-bold flex items-center space-x-2"
                                    >
                                        <span>Далее</span><i data-lucide="chevron-right" className="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'list' && (
                            <div className="flex flex-col pb-10">
                                <div className="sticky top-0 bg-gray-50 pb-4 z-10">
                                    <div className="relative">
                                        <input type="text" placeholder="Поиск термина..." className="w-full p-4 pl-12 rounded-2xl bg-white outline-none shadow-sm focus:ring-2 ring-blue-100 transition-all" onChange={e => setSearch(e.target.value)} />
                                        <i data-lucide="search" className="absolute left-4 top-4 w-5 h-5 text-gray-400"></i>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    {words.filter(w => w.e.toLowerCase().includes(search.toLowerCase()) || w.r.toLowerCase().includes(search.toLowerCase())).map((w, index) => (
                                        <div key={w.id} className="bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm border border-gray-100">
                                            <div className="flex items-center space-x-4">
                                                <span className="text-[10px] font-bold text-gray-300 w-6 text-center">{index + 1}</span>
                                                <div>
                                                    <p className="font-bold text-sm text-gray-900">{w.e}</p>
                                                    <p className="text-xs text-gray-500 font-medium">{w.r}</p>
                                                </div>
                                            </div>
                                            <button onClick={() => {
                                                const next = new Set(learned);
                                                if (next.has(w.id)) next.delete(w.id); else next.add(w.id);
                                                setLearned(next);
                                            }} className={`p-2 rounded-full transition-colors ${learned.has(w.id) ? 'text-green-500 bg-green-50' : 'text-gray-200 bg-gray-50'}`}>
                                                <i data-lucide="check-circle-2" className="w-6 h-6"></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navigation Tab Bar */}
                    <nav className="flex-none apple-blur border-t border-gray-100 flex justify-around items-center tab-bar">
                        <button onClick={() => setActiveTab('cards')} className={`flex flex-col items-center w-full transition-colors ${activeTab === 'cards' ? 'text-blue-500' : 'text-gray-400'}`}>
                            <i data-lucide="layers" className="w-6 h-6"></i>
                            <span className="text-[10px] font-bold mt-1.5 uppercase tracking-tighter">Карточки</span>
                        </button>
                        <button onClick={() => setActiveTab('quiz')} className={`flex flex-col items-center w-full transition-colors ${activeTab === 'quiz' ? 'text-blue-500' : 'text-gray-400'}`}>
                            <i data-lucide="graduation-cap" className="w-6 h-6"></i>
                            <span className="text-[10px] font-bold mt-1.5 uppercase tracking-tighter">Тест</span>
                        </button>
                        <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center w-full transition-colors ${activeTab === 'list' ? 'text-blue-500' : 'text-gray-400'}`}>
                            <i data-lucide="list" className="w-6 h-6"></i>
                            <span className="text-[10px] font-bold mt-1.5 uppercase tracking-tighter">Список</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
